<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bubbleflow Dynamic Space App Visualizer</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #65727b;
      --line: #d7dee2;
      --green: #0f766e;
      --blue: #2563eb;
      --red: #b91c1c;
      --gold: #b7791f;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      padding: 20px 24px 14px;
      background: #fbfcfb;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 5px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .badge {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 410px;
      gap: 16px;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .visual-panel {
      display: grid;
      grid-template-rows: auto minmax(440px, 1fr);
      min-height: 650px;
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .toolbar strong {
      font-size: 14px;
    }

    .toolbar span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    input[type="file"] {
      font-size: 12px;
      max-width: 220px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.045) 0 1px, transparent 1px),
        linear-gradient(0deg, rgba(15, 118, 110, 0.045) 0 1px, transparent 1px),
        #fafbf9;
      background-size: 28px 28px;
    }

    aside {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      min-height: 0;
    }

    .side {
      padding: 14px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 15px;
      margin: 0;
      letter-spacing: 0;
    }

    .title-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      background: #fbfcfb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 62px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 750;
      margin-top: 5px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 330px;
      overflow: auto;
      padding-right: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      border-bottom: 1px solid #edf0f2;
      padding: 8px 0;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--green);
    }

    .name {
      font-weight: 650;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .size {
      color: #293741;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .badges {
        justify-content: start;
      }

      main {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Bubbleflow Dynamic Space.app</h1>
      <div class="sub">macOS bundle structure, Info.plist metadata, and JUCE/BDS integration view</div>
    </div>
    <div class="badges" id="badges"></div>
  </header>

  <main>
    <section class="panel visual-panel">
      <div class="toolbar">
        <div>
          <strong id="bundleName">Bubbleflow Dynamic Space</strong>
          <span id="bundlePath">C:/Users/25637/Desktop/VBAP+BDS-Codec/Bubbleflow Dynamic Space.app</span>
        </div>
        <input id="fileInput" type="file" accept=".json,application/json">
      </div>
      <canvas id="bundleCanvas"></canvas>
    </section>

    <aside>
      <section class="panel side">
        <div class="title-row">
          <h2>Bundle Info</h2>
          <span>Info.plist</span>
        </div>
        <div class="metrics" id="metrics"></div>
      </section>

      <section class="panel side">
        <div class="title-row">
          <h2>Files</h2>
          <span id="fileCount">5 files</span>
        </div>
        <div class="list" id="fileList"></div>
      </section>

      <section class="panel side">
        <div class="title-row">
          <h2>Capabilities</h2>
          <span>static scan</span>
        </div>
        <div class="list" id="capList"></div>
      </section>
    </aside>
  </main>

  <script>
    let manifest = {
      "app_path": "C:/Users/25637/Desktop/VBAP+BDS-Codec/Bubbleflow Dynamic Space.app",
      "bundle": {
        "CFBundleExecutable": "Bubbleflow Dynamic Space",
        "CFBundleIdentifier": "com.bubbleflow.dynamicspace",
        "CFBundleName": "Bubbleflow Dynamic Space",
        "CFBundleDisplayName": "Bubbleflow Dynamic Space",
        "CFBundlePackageType": "APPL",
        "CFBundleSignature": "????",
        "CFBundleShortVersionString": "0.1.0",
        "CFBundleVersion": "0.1.0",
        "NSHighResolutionCapable": true,
        "NSMicrophoneUsageDescription": "Bubbleflow Dynamic Space needs microphone access to capture live audio input."
      },
      "executable": {
        "relative_path": "Contents/MacOS/Bubbleflow Dynamic Space",
        "size_bytes": 15101077,
        "magic_hex": "CA FE BA BE 00 00 00 02 01 00 00 07 00 00 00 03",
        "format_note": "Mach-O universal/fat binary signature; inspect/run on macOS."
      },
      "files": [
        { "path": "Contents/Info.plist", "size_bytes": 1015, "role": "macOS bundle metadata and app permissions" },
        { "path": "Contents/PkgInfo", "size_bytes": 8, "role": "macOS package type marker, APPL????" },
        { "path": "Contents/MacOS/Bubbleflow Dynamic Space", "size_bytes": 15101077, "role": "main app executable" },
        { "path": "Contents/Resources/RecentFilesMenuTemplate.nib", "size_bytes": 2842, "role": "native macOS recent-files menu resource" },
        { "path": "Contents/_CodeSignature/CodeResources", "size_bytes": 2476, "role": "code-signing resource hash manifest" }
      ],
      "directories": [
        { "path": "Contents", "role": "bundle root content directory" },
        { "path": "Contents/MacOS", "role": "native executable directory" },
        { "path": "Contents/Resources", "role": "UI/resource directory" },
        { "path": "Contents/_CodeSignature", "role": "macOS code-signing metadata" }
      ],
      "capabilities": [
        { "name": "Microphone input", "status": "declared", "source": "NSMicrophoneUsageDescription" },
        { "name": "High resolution display", "status": "declared", "source": "NSHighResolutionCapable" },
        { "name": "Recent files menu", "status": "resource present", "source": "RecentFilesMenuTemplate.nib" },
        { "name": "BDS export", "status": "not visible in bundle metadata", "source": "requires app/runtime inspection" }
      ],
      "integration_notes": [
        "This is a macOS .app bundle, so Windows can inspect files but cannot run the app directly.",
        "The microphone permission suggests the app is intended to capture live audio input.",
        "The bundle metadata does not show whether bds-codec is linked; verify on macOS with otool or app logs.",
        "The CXW demo can provide scene JSON and BDS export bridge code for this JUCE app to integrate."
      ]
    };

    const canvas = document.getElementById("bundleCanvas");
    const ctx = canvas.getContext("2d");
    const metrics = document.getElementById("metrics");
    const fileList = document.getElementById("fileList");
    const capList = document.getElementById("capList");
    const badges = document.getElementById("badges");
    const fileCount = document.getElementById("fileCount");
    const bundleName = document.getElementById("bundleName");
    const bundlePath = document.getElementById("bundlePath");

    function formatBytes(bytes) {
      if (bytes >= 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      if (bytes >= 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${bytes} B`;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function roundRectPath(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function node(x, y, w, h, title, subtitle, color) {
      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      roundRectPath(x, y, w, h, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = "700 14px system-ui, sans-serif";
      ctx.fillText(title, x + 14, y + 24);
      ctx.fillStyle = "#41505a";
      ctx.font = "12px system-ui, sans-serif";
      ctx.fillText(subtitle, x + 14, y + 48);
      ctx.restore();
    }

    function line(x1, y1, x2, y2) {
      ctx.save();
      ctx.strokeStyle = "#93a1aa";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      const rootW = Math.min(360, w - 56);
      const rootX = (w - rootW) / 2;
      const rootY = 34;

      node(rootX, rootY, rootW, 72, "Bubbleflow Dynamic Space.app", manifest.bundle.CFBundleIdentifier, "#0f766e");

      const rowY = rootY + 128;
      const colW = Math.min(220, (w - 80) / 3);
      const gap = 24;
      const totalW = colW * 3 + gap * 2;
      const startX = Math.max(24, (w - totalW) / 2);

      const columns = [
        { title: "MacOS", sub: "main executable", color: "#2563eb" },
        { title: "Resources", sub: "nib/menu resources", color: "#b7791f" },
        { title: "_CodeSignature", sub: "CodeResources", color: "#b91c1c" }
      ];

      columns.forEach((item, index) => {
        const x = startX + index * (colW + gap);
        line(rootX + rootW / 2, rootY + 72, x + colW / 2, rowY);
        node(x, rowY, colW, 72, item.title, item.sub, item.color);
      });

      const fileY = rowY + 132;
      const maxSize = Math.max(...manifest.files.map(f => f.size_bytes));
      const barW = Math.min(680, w - 72);
      const barX = (w - barW) / 2;

      ctx.save();
      ctx.fillStyle = "#172026";
      ctx.font = "700 14px system-ui, sans-serif";
      ctx.fillText("Bundle payload by file size", barX, fileY - 18);
      ctx.restore();

      manifest.files.forEach((file, index) => {
        const y = fileY + index * 44;
        const pct = file.size_bytes / maxSize;
        ctx.save();
        ctx.fillStyle = "#edf2f1";
        roundRectPath(barX, y, barW, 24, 6);
        ctx.fill();
        ctx.fillStyle = file.path.includes("MacOS") ? "#2563eb" : "#0f766e";
        roundRectPath(barX, y, Math.max(4, barW * pct), 24, 6);
        ctx.fill();
        ctx.fillStyle = "#172026";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText(file.path, barX + 8, y + 17);
        ctx.textAlign = "right";
        ctx.fillText(formatBytes(file.size_bytes), barX + barW - 8, y + 17);
        ctx.restore();
      });
    }

    function render() {
      bundleName.textContent = manifest.bundle.CFBundleDisplayName || manifest.bundle.CFBundleName;
      bundlePath.textContent = manifest.app_path;
      badges.innerHTML = [
        manifest.bundle.CFBundlePackageType,
        `v${manifest.bundle.CFBundleShortVersionString}`,
        manifest.bundle.CFBundleIdentifier,
        "macOS .app"
      ].map(v => `<span class="badge">${v}</span>`).join("");

      metrics.innerHTML = [
        ["Executable", manifest.bundle.CFBundleExecutable],
        ["Version", manifest.bundle.CFBundleVersion],
        ["Package", manifest.bundle.CFBundlePackageType],
        ["Binary", formatBytes(manifest.executable.size_bytes)],
        ["Magic", manifest.executable.magic_hex.slice(0, 11)],
        ["Mic", manifest.bundle.NSMicrophoneUsageDescription ? "declared" : "missing"]
      ].map(([label, value]) => `
        <div class="metric">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
        </div>
      `).join("");

      fileCount.textContent = `${manifest.files.length} files`;
      fileList.innerHTML = manifest.files.map(file => `
        <div class="row">
          <span class="dot"></span>
          <div>
            <div class="name">${file.path}</div>
            <div class="meta">${file.role}</div>
          </div>
          <div class="size">${formatBytes(file.size_bytes)}</div>
        </div>
      `).join("");

      capList.innerHTML = manifest.capabilities.map(cap => `
        <div class="row">
          <span class="dot" style="background:${cap.status.includes("not") ? "#b91c1c" : "#0f766e"}"></span>
          <div>
            <div class="name">${cap.name}</div>
            <div class="meta">${cap.status} / ${cap.source}</div>
          </div>
          <div class="size"></div>
        </div>
      `).join("");

      draw();
    }

    document.getElementById("fileInput").addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          manifest = JSON.parse(reader.result);
          render();
          resizeCanvas();
        } catch (error) {
          alert(`JSON parse failed: ${error.message}`);
        }
      };
      reader.readAsText(file);
    });

    window.addEventListener("resize", resizeCanvas);
    render();
    resizeCanvas();
  </script>
</body>
</html>
